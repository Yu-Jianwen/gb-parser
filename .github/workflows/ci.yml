name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Check package metadata
        run: |
          pip install check-wheel-contents
          check-wheel-contents dist/*.whl

      - name: Smoke test (detect only, no mineru)
        run: |
          # Only install pypdf to test the detect module
          pip install pypdf>=5.0
          PYTHONPATH=src python -c "
          from gb_parser.detect import detect_pdf
          import json
          # 测试模块加载正常
          print('detect_pdf module loaded OK')
          print('fix_garbled module functions:', [f for f in dir(__import__('gb_parser.fix_garbled')) if not f.startswith('_')][:10])
          "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
